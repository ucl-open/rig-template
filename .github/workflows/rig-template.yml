name: rig-template
on:
  push:
    # This prevents tag pushes from triggering this workflow
    branches: ['**']

jobs:
    build-python: # build package and run codebase checks and tests using pyproject.toml
        strategy:
            fail-fast: false
            matrix:
            # Test all supported Python versions on Linux
                platform:
                - name: Linux
                  os: ubuntu-latest
                python-version: ["3.11", "3.12", "3.13"]
                # Test latest supported Python version on Windows and macOS
                include:
                - platform:
                    name: Linux
                    os: ubuntu-latest
                    python-version: "3.13"
                    codecov: --cov-report=xml:tests/test_coverage/test_coverage_report.xml
                    collect-packages: true
                - platform:
                    name: Windows
                    os: windows-latest
                    python-version: "3.13"
                - platform:
                    name: macOS
                    os: macos-latest
                    python-version: "3.13"
        name: ${{ matrix.platform.name }} Python ${{ matrix.python-version }}
        runs-on: ${{ matrix.platform.os }}
        steps:
        # -------------------------------------------------------- Checkout
            - name: Checkout
              uses: actions/checkout@v5

                    # -------------------------------------------------------- Set up tools
            - name: Install uv and set Python version
              uses: astral-sh/setup-uv@v7
              with:
                python-version: ${{ matrix.python-version }}

            # -------------------------------------------------------- Configure build
            - name: Install the project
              run: uv sync --all-extras --dev

            - name: Generate copier template
              run: |
                git init /tmp/example
                uv copier copy -l --vcs-ref=HEAD . /tmp/example
